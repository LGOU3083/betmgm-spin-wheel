<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BetMGM – Spin & Win</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #F0CF7A;
    --gold-dark: #8B6914;
    --black: #0A0A0A;
    --charcoal: #1A1A1A;
    --dark: #111111;
    --white: #FFFFFF;
    --off-white: #F5F0E8;
    --green: #00843D;
    --green-light: #00A84D;
    --red: #C8102E;
    /* CCI Global brand colours */
    --cci-orange: #944615;
    --cci-tan: #D7BFA5;
    --cci-dark: #313131;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--black);
    font-family: 'Barlow', sans-serif;
    touch-action: none;
  }

  /* ── Background ── */
  .bg {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, #1a1200 0%, #0A0A0A 60%);
    z-index: 0;
  }
  .bg::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(201,168,76,0.06) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(0,132,61,0.06) 0%, transparent 50%);
  }
  .bg-lines {
    position: absolute; inset: 0;
    background-image: repeating-linear-gradient(
      0deg, transparent, transparent 59px,
      rgba(201,168,76,0.04) 60px
    ),
    repeating-linear-gradient(
      90deg, transparent, transparent 59px,
      rgba(201,168,76,0.04) 60px
    );
  }

  /* ── Layout ── */
  .app {
    position: relative; z-index: 1;
    width: 100vw; height: 100vh;
    display: flex; flex-direction: column;
    align-items: center;
    padding: 24px 20px 56px;
  }

  /* ── Header ── */
  .header {
    display: flex; flex-direction: column; align-items: center;
    gap: 4px; margin-bottom: 20px;
    animation: fadeDown 0.6s ease both;
  }
  .logo-area {
    display: flex; align-items: center; gap: 10px;
  }
  .lion-icon {
    width: 44px; height: 44px;
    background: var(--gold);
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
  }
  .brand-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 42px; font-weight: 900;
    letter-spacing: 2px;
    background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-transform: uppercase;
  }
  .tagline {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px; font-weight: 600;
    color: rgba(201,168,76,0.6);
    letter-spacing: 6px; text-transform: uppercase;
  }

  /* ── CCI Header Logo ── */
  .cci-logo-header {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 14px;
    border: 1px solid rgba(148,70,21,0.4);
    border-radius: 4px;
    background: rgba(148,70,21,0.08);
    margin-top: 6px;
  }
  .cci-badge {
    display: flex; align-items: center; justify-content: center;
    width: 28px; height: 28px;
    background: var(--cci-orange);
    border-radius: 3px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px; font-weight: 900;
    color: #fff; letter-spacing: 0.5px;
  }
  .cci-header-text {
    display: flex; flex-direction: column; line-height: 1.1;
  }
  .cci-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px; font-weight: 800;
    color: var(--cci-tan);
    letter-spacing: 2px; text-transform: uppercase;
  }
  .cci-sub {
    font-family: 'Barlow', sans-serif;
    font-size: 9px; font-weight: 500;
    color: rgba(215,191,165,0.5);
    letter-spacing: 1.5px; text-transform: uppercase;
  }

  /* ── CCI Footer ── */
  .cci-footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 36px;
    background: linear-gradient(90deg, rgba(148,70,21,0.15) 0%, rgba(49,49,49,0.3) 50%, rgba(148,70,21,0.15) 100%);
    border-top: 1px solid rgba(148,70,21,0.3);
    display: flex; align-items: center; justify-content: center;
    gap: 10px;
    z-index: 50;
  }
  .footer-divider {
    width: 1px; height: 14px;
    background: rgba(215,191,165,0.3);
  }
  .footer-badge {
    width: 18px; height: 18px;
    background: var(--cci-orange);
    border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px; font-weight: 900; color: #fff;
  }
  .footer-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 600;
    color: rgba(215,191,165,0.55);
    letter-spacing: 2px; text-transform: uppercase;
  }
  .footer-brand {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 800;
    color: var(--cci-tan);
    letter-spacing: 1.5px; text-transform: uppercase;
  }

  /* ── Wheel Container ── */
  .wheel-area {
    position: relative;
    display: flex; align-items: center; justify-content: center;
    flex: 1;
    width: 100%;
  }

  .wheel-wrapper {
    position: relative;
    width: 520px; height: 520px;
    animation: fadeIn 0.8s ease 0.2s both;
  }

  /* Outer glow ring */
  .wheel-glow {
    position: absolute; inset: -20px;
    border-radius: 50%;
    background: radial-gradient(circle, transparent 48%, rgba(201,168,76,0.15) 60%, transparent 75%);
    pointer-events: none;
  }

  /* Decorative outer ring */
  .wheel-ring {
    position: absolute; inset: -10px;
    border-radius: 50%;
    border: 3px solid transparent;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark), var(--gold), var(--gold-dark)) border-box;
    -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: destination-out;
    mask-composite: exclude;
    pointer-events: none;
  }

  /* Spinning dots on ring */
  .ring-dots {
    position: absolute; inset: -14px;
    border-radius: 50%;
    pointer-events: none;
  }

  canvas#wheel {
    border-radius: 50%;
    box-shadow:
      0 0 60px rgba(201,168,76,0.3),
      0 0 120px rgba(201,168,76,0.1),
      0 20px 80px rgba(0,0,0,0.8);
    display: block;
  }

  /* Center hub */
  .hub {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 80px; height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #2a2000, #0A0A0A);
    border: 4px solid var(--gold);
    box-shadow: 0 0 20px rgba(201,168,76,0.5), inset 0 0 20px rgba(0,0,0,0.8);
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
    cursor: pointer;
  }
  .hub-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 900;
    color: var(--gold);
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: center;
    line-height: 1.1;
  }

  /* Pointer / arrow */
  .pointer {
    position: absolute;
    top: 50%; right: -30px;
    transform: translateY(-50%);
    width: 0; height: 0;
    border-top: 22px solid transparent;
    border-bottom: 22px solid transparent;
    border-right: 42px solid var(--gold);
    filter: drop-shadow(0 0 12px rgba(201,168,76,0.8));
    z-index: 20;
  }
  .pointer::after {
    content: '';
    position: absolute;
    top: -14px; right: -42px;
    width: 0; height: 0;
    border-top: 14px solid transparent;
    border-bottom: 14px solid transparent;
    border-right: 26px solid rgba(201,168,76,0.3);
  }

  /* ── CTA Button ── */
  .cta-area {
    display: flex; flex-direction: column; align-items: center;
    gap: 12px; margin-top: 16px;
    animation: fadeUp 0.6s ease 0.4s both;
  }

  .spin-btn {
    position: relative;
    padding: 18px 64px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px; font-weight: 900;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--black);
    background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 40%, var(--gold-dark) 100%);
    border: none; border-radius: 4px;
    cursor: pointer;
    box-shadow: 0 8px 32px rgba(201,168,76,0.4), 0 2px 0 rgba(255,255,255,0.1) inset;
    transition: transform 0.1s, box-shadow 0.1s;
    overflow: hidden;
  }
  .spin-btn::before {
    content: '';
    position: absolute; top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transform: skewX(-20deg);
    transition: left 0.4s;
  }
  .spin-btn:hover::before { left: 150%; }
  .spin-btn:active { transform: translateY(2px); box-shadow: 0 4px 16px rgba(201,168,76,0.4); }
  .spin-btn:disabled {
    opacity: 0.5; cursor: not-allowed;
    transform: none;
  }

  .hint-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px; font-weight: 600;
    color: rgba(201,168,76,0.4);
    letter-spacing: 3px; text-transform: uppercase;
  }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s;
  }
  .modal-overlay.show {
    opacity: 1; pointer-events: all;
  }
  .modal {
    background: linear-gradient(160deg, #1a1200 0%, #0d0d0d 100%);
    border: 1px solid var(--gold);
    border-radius: 12px;
    padding: 48px 56px;
    text-align: center;
    max-width: 480px; width: 90%;
    box-shadow: 0 0 80px rgba(201,168,76,0.3), 0 40px 80px rgba(0,0,0,0.8);
    transform: scale(0.85) translateY(20px);
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .modal-overlay.show .modal {
    transform: scale(1) translateY(0);
  }

  .modal-trophy {
    font-size: 64px; margin-bottom: 16px;
    animation: bounce 0.6s ease 0.4s both;
  }
  .modal-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px; font-weight: 700;
    letter-spacing: 5px; color: rgba(201,168,76,0.6);
    text-transform: uppercase; margin-bottom: 8px;
  }
  .modal-prize {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 52px; font-weight: 900;
    line-height: 1;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
  }
  .modal-sub {
    font-size: 15px; color: rgba(255,255,255,0.5);
    margin-bottom: 36px; line-height: 1.5;
  }
  .modal-btn {
    padding: 14px 40px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px; font-weight: 800;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--black);
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    border: none; border-radius: 4px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(201,168,76,0.4);
    transition: transform 0.1s;
  }
  .modal-btn:active { transform: scale(0.97); }

  /* ── Confetti ── */
  .confetti-container {
    position: fixed; inset: 0; pointer-events: none; z-index: 99;
    overflow: hidden;
  }
  .confetti-piece {
    position: absolute;
    width: 8px; height: 14px;
    opacity: 0;
    animation: confettiFall var(--dur) ease var(--delay) both;
  }

  /* ── Animations ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes bounce {
    0% { transform: scale(0); }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }
  @keyframes confettiFall {
    0% { opacity: 1; transform: translateY(-20px) rotate(0deg); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
  }
  @keyframes hubPulse {
    0%, 100% { box-shadow: 0 0 20px rgba(201,168,76,0.5), inset 0 0 20px rgba(0,0,0,0.8); }
    50% { box-shadow: 0 0 40px rgba(201,168,76,0.8), inset 0 0 20px rgba(0,0,0,0.8); }
  }
  .hub.idle { animation: hubPulse 2s ease-in-out infinite; }

  /* ── Name Entry Screen ── */
  .name-screen {
    position: fixed; inset: 0; z-index: 200;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 32px;
    background: radial-gradient(ellipse at 50% 30%, #1a1200 0%, #0A0A0A 70%);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .name-screen.hide {
    opacity: 0; transform: scale(1.04) translateY(-16px);
    pointer-events: none;
  }
  .name-screen-logo {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 8px;
  }
  .name-screen-lion {
    width: 52px; height: 52px;
    background: var(--gold);
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
  }
  .name-screen-brand {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 52px; font-weight: 900; letter-spacing: 2px;
    background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-transform: uppercase;
  }
  .name-screen-tagline {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px; font-weight: 600;
    color: rgba(201,168,76,0.5); letter-spacing: 6px;
    text-transform: uppercase; margin-bottom: 48px;
  }
  .name-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 12px;
    padding: 40px 48px;
    width: 100%; max-width: 480px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .name-card-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px; font-weight: 800;
    color: var(--white); letter-spacing: 1px;
    text-transform: uppercase; margin-bottom: 6px;
  }
  .name-card-sub {
    font-size: 14px; color: rgba(255,255,255,0.4);
    margin-bottom: 28px; line-height: 1.5;
  }
  .name-input-wrap {
    position: relative; margin-bottom: 20px;
  }
  .name-input {
    width: 100%;
    padding: 16px 20px;
    font-family: 'Barlow', sans-serif;
    font-size: 18px; font-weight: 500;
    color: var(--white);
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(201,168,76,0.3);
    border-radius: 6px;
    outline: none;
    text-align: center;
    letter-spacing: 1px;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }
  .name-input::placeholder { color: rgba(255,255,255,0.25); }
  .name-input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(201,168,76,0.2);
  }
  .name-error {
    font-size: 12px; color: #ff6b6b;
    margin-top: -12px; margin-bottom: 16px;
    min-height: 16px; letter-spacing: 0.5px;
  }
  .name-submit-btn {
    width: 100%;
    padding: 18px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px; font-weight: 900;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--black);
    background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 40%, var(--gold-dark) 100%);
    border: none; border-radius: 6px;
    cursor: pointer;
    box-shadow: 0 8px 32px rgba(201,168,76,0.35);
    transition: transform 0.1s, box-shadow 0.1s;
    position: relative; overflow: hidden;
  }
  .name-submit-btn::before {
    content: '';
    position: absolute; top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transform: skewX(-20deg);
    transition: left 0.4s;
  }
  .name-submit-btn:hover::before { left: 150%; }
  .name-submit-btn:active { transform: translateY(2px); }

  .name-screen-cci {
    display: flex; align-items: center; gap: 8px;
    margin-top: 32px; opacity: 0.5;
  }
  .name-screen-cci-badge {
    width: 20px; height: 20px;
    background: var(--cci-orange); border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; font-weight: 900; color: #fff;
  }
  .name-screen-cci-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px; font-weight: 700;
    color: var(--cci-tan); letter-spacing: 2px; text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="bg"><div class="bg-lines"></div></div>

<!-- Name Entry Screen -->

let playerName = '';

// ── Name Screen Logic ──
const nameScreen = document.getElementById('nameScreen');
const nameInput  = document.getElementById('nameInput');
const nameSubmit = document.getElementById('nameSubmit');
const nameError  = document.getElementById('nameError');

function submitName() {
  const val = nameInput.value.trim();
  if (!val) {
    nameError.textContent = 'Please enter your name to continue.';
    nameInput.focus();
    return;
  }
  playerName = val.charAt(0).toUpperCase() + val.slice(1);
  nameError.textContent = '';
  nameScreen.classList.add('hide');
  document.getElementById('hintText').textContent = `Good luck, ${playerName}!`;
}

nameSubmit.addEventListener('click', submitName);
nameInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') submitName();
});
nameInput.addEventListener('input', function() {
  if (nameError.textContent) nameError.textContent = '';
});

// Focus input on load
setTimeout(() => nameInput.focus(), 400);

function drawWheel(angle) {
  ctx.clearRect(0, 0, W, W);

  for (let i = 0; i < NUM; i++) {
    const start = angle + i * ARC;
    const end = start + ARC;
    const p = prizes[i];

    // Segment fill
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, R, start, end);
    ctx.closePath();

    const grad = ctx.createRadialGradient(CX, CY, R * 0.3, CX, CY, R);
    grad.addColorStop(0, p.color);
    grad.addColorStop(1, p.dark);
    ctx.fillStyle = grad;
    ctx.fill();

    // Segment border
    ctx.strokeStyle = 'rgba(0,0,0,0.6)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Subtle inner highlight
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, R * 0.35, start, end);
    ctx.closePath();
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.fill();

    // Text
    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(start + ARC / 2);
    ctx.textAlign = 'right';

    // Emoji
    ctx.font = `${W * 0.057}px serif`;
    ctx.fillText(p.emoji, R * 0.88, W * 0.022);

    // Label
    ctx.fillStyle = '#FFFFFF';
    ctx.shadowColor = 'rgba(0,0,0,0.8)';
    ctx.shadowBlur = 6;
    ctx.font = `800 ${W * 0.038}px 'Barlow Condensed', sans-serif`;
    ctx.fillText(p.label.toUpperCase(), R * 0.62, W * 0.022);
    ctx.shadowBlur = 0;

    ctx.restore();
  }

  // Center circle cutout (covered by hub div)
  ctx.beginPath();
  ctx.arc(CX, CY, 46, 0, Math.PI * 2);
  ctx.fillStyle = '#0A0A0A';
  ctx.fill();
  ctx.strokeStyle = 'rgba(201,168,76,0.3)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

drawWheel(0);

// Spin logic
function spin() {
  if (spinning) return;
  spinning = true;

  const btn = document.getElementById('spinBtn');
  const hub = document.getElementById('hub');
  btn.disabled = true;
  hub.classList.remove('idle');
  document.getElementById('hintText').textContent = 'Spinning…';

  const extraSpins = (Math.floor(Math.random() * 5) + 6) * Math.PI * 2;
  const targetOffset = Math.random() * Math.PI * 2;
  const totalRotation = extraSpins + targetOffset;
  const duration = 4000 + Math.random() * 1500;
  const startAngle = currentAngle;
  const startTime = performance.now();

  function easeOut(t) {
    return 1 - Math.pow(1 - t, 4);
  }

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const easedProgress = easeOut(progress);
    currentAngle = startAngle + totalRotation * easedProgress;
    drawWheel(currentAngle);

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      currentAngle = currentAngle % (Math.PI * 2);
      onSpinEnd();
    }
  }

  requestAnimationFrame(animate);
}

function onSpinEnd() {
  // Pointer is at right (angle = 0 from center right), wheel rotates CCW from canvas perspective
  // Segment at pointer: normalize angle, find which segment faces right
  const norm = ((Math.PI * 2) - (currentAngle % (Math.PI * 2))) % (Math.PI * 2);
  const idx = Math.floor(norm / ARC) % NUM;
  const prize = prizes[idx];

  setTimeout(() => {
    showModal(prize);
    spinning = false;
    document.getElementById('spinBtn').disabled = false;
    document.getElementById('hub').classList.add('idle');
    document.getElementById('hintText').textContent = 'Tap to try your luck';
  }, 400);
}

function showModal(prize) {
  document.getElementById('modalEmoji').textContent = prize.emoji;
  document.getElementById('modalGreeting').textContent = prize.label === 'Try Again'
    ? `Sorry, ${playerName}!`
    : `🎉 ${playerName}, you won`;
  document.getElementById('modalPrize').textContent = prize.label;
  document.getElementById('modalSub').textContent = prize.sub;
  document.getElementById('modal').classList.add('show');

  if (prize.label !== 'Try Again') {
    launchConfetti();
  }
}

function hideModal() {
  document.getElementById('modal').classList.remove('show');
  clearConfetti();
  // Reset for next player
  playerName = '';
  nameInput.value = '';
  nameError.textContent = '';
  document.getElementById('hintText').textContent = 'Tap to try your luck';
  setTimeout(() => {
    nameScreen.classList.remove('hide');
    setTimeout(() => nameInput.focus(), 300);
  }, 300);
}

// Confetti
function launchConfetti() {
  const container = document.getElementById('confetti');
  const colors = ['#C9A84C', '#F0CF7A', '#00843D', '#C8102E', '#ffffff', '#FFD700'];
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left: ${Math.random() * 100}%;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      --dur: ${1.5 + Math.random() * 2}s;
      --delay: ${Math.random() * 0.8}s;
      transform: rotate(${Math.random() * 360}deg) skewX(${Math.random() * 20 - 10}deg);
      width: ${6 + Math.random() * 8}px;
      height: ${10 + Math.random() * 10}px;
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
    `;
    container.appendChild(el);
  }
}

function clearConfetti() {
  document.getElementById('confetti').innerHTML = '';
}

// Events
document.getElementById('spinBtn').addEventListener('click', spin);
document.getElementById('hub').addEventListener('click', spin);
document.getElementById('modalBtn').addEventListener('click', hideModal);
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) hideModal();
});
</script>
